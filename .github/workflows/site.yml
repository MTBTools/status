name: Static Site CI

on:
  workflow_dispatch:
  repository_dispatch:
    types: [site]

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GH_PAT: ${{ secrets.GH_PAT }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.43.1
        with:
          command: "site"
