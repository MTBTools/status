name: Uptime CI

on:
  workflow_dispatch:
  repository_dispatch:
    types: [uptime]

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  uptime:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.43.1
        with:
          token: ${{ secrets.GH_PAT }}
