name: Graphs CI

on:
  workflow_dispatch:
  repository_dispatch:
    types: [graphs]

permissions:
  contents: write

env:
  GH_PAT: ${{ secrets.GH_PAT }}

jobs:
  graphs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.43.1
        with:
          command: "graphs"
