name: Summary CI

on:
  workflow_dispatch:
  repository_dispatch:
    types: [summary]

permissions:
  contents: write

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.43.1
        with:
          token: ${{ secrets.GH_PAT }}
          command: "summary"
